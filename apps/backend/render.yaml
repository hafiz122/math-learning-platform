services:
  - type: web
    name: math-learning-platform-api
    env: python
    rootDir: apps/backend
    buildCommand: pip install -e ".[dev]" && alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SESSION_PERSISTENCE_ENABLED
        value: "true"
      - key: APP_ENV
        value: production
databases:
  - name: math-learning-platform-db
