version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: math_learning
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: infrastructure/docker/backend.Dockerfile
    env_file:
      - apps/backend/.env.example
    environment:
      APP_ENV: development
      SESSION_PERSISTENCE_ENABLED: "true"
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/math_learning
      QUESTION_TOKEN_SECRET: docker-secret
      BACKEND_CORS_ORIGINS: http://localhost:4173,http://localhost:5173
    depends_on:
      - db
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: infrastructure/docker/frontend.Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8000
    depends_on:
      - backend
    ports:
      - "4173:80"

volumes:
  postgres_data:
